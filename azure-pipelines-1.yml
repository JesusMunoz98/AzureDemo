# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest


# =========================
# REPOS EXTERNOS (QA REPO)
# =========================
resources:
  repositories:
  - repository: qaRepo
    type: github
    name: JesusMunoz98/AutoAzure
    endpoint: github.com_JesusMunoz98


stages:

# =========================
# 1. BUILD STAGE (DEV REPO)
# =========================
- stage: Build
  displayName: "Build Application"
  jobs:
  - job: BuildJob
    steps:

    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'package'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'

    - task: CopyFiles@2
      inputs:
        Contents: '**/*.war'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'warfile'
        publishLocation: 'Container'


# =========================
# 2. DEPLOY STAGE (QA ENV)
# =========================
- stage: DeployQA
  displayName: "Deploy to QA"
  dependsOn: Build
  jobs:
  - job: DeployJob
    steps:

    - download: current
      artifact: warfile

    - script: |
        echo "Deploying WAR to QA environment..."
        echo "Here you would deploy to Azure Web App / Tomcat / VM"
        ls -la


# =========================
# 3. TEST STAGE (QA AUTOMATION)
# =========================
- stage: Test
  displayName: "Run Selenium + TestNG Tests"
  dependsOn: DeployQA
  jobs:
  - job: SeleniumTests
    steps:

    - script: |
        echo "Installing Chrome..."
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        google-chrome --version

    # =========================
    # CHECKOUT QA REPO
    # =========================
    - checkout: qaRepo

    # =========================
    # RUN TESTS
    # =========================
    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean test'
        options: '-Denv=qa'
